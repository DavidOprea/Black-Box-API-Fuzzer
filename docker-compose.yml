services:
  redis:
    image: redis:7-alpine
    container_name: black-box-fuzzer-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: black-box-fuzzer-api
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0  # <-- FIXED: Point to DB 0
      - API_TIMEOUT=300
      - CONCURRENCY_LIMIT=20
      - RATE_LIMIT_RPS=10.0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app                             # <-- FIXED: Added code syncing
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: black-box-fuzzer-worker
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0  # <-- FIXED: Added explicitly
      - API_TIMEOUT=300
      - CONCURRENCY_LIMIT=20
      - RATE_LIMIT_RPS=10.0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A app.worker worker --loglevel=info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: black-box-fuzzer-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api

volumes:
  redis_data:

networks:
  default:
    name: black-box-fuzzer-network